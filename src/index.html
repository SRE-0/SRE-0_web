<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Favicon — place your icon at public/favicon.ico or change this path.
      Vite copies everything in /public to the root of the dist folder.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Page title shown in the browser tab.
      Change to match your project name.
    -->
    <title>SRE-0</title>
  </head>
  <body>
    <!--
      Root mount point for React.
      ReactDOM.createRoot targets this element in main.tsx.
      Must have id="root" to match the selector in main.tsx.
    -->
    <div id="root"></div>

    <!--
      Entry point for Vite.
      Vite reads this script tag, resolves the module graph starting
      from main.tsx, and replaces this tag with the compiled bundle
      during "vite build".
      Do NOT change this to a compiled path — Vite handles that.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
