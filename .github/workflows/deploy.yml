# deploy.yml
# Workflow: Build and deploy the React/Vite project to GitHub Pages.
# Trigger: Only when a tag matching the pattern "deploy-*" is pushed
#          (e.g., deploy-v1.0.0, deploy-dev-2025).
# Restriction: The job will abort if the actor who triggered the workflow
#              is not "SRE-0". This acts as a soft actor-level guard.

name: Deploy to GitHub Pages

on:
  push:
    tags:
      # Only tags that match this pattern will trigger the workflow.
      # Examples: deploy-v1.0.0 | deploy-dev | deploy-2025-01-01
      - "deploy-*"

# Sets permissions for the GITHUB_TOKEN used by the workflow.
# "contents: read"  -> allows checking out the repository code.
# "pages: write"    -> allows uploading and deploying to GitHub Pages.
# "id-token: write" -> required by the official GitHub Pages deploy action
#                      to authenticate via OIDC (no PAT needed).
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running at the same time.
# If a new deployment is triggered while one is running, the in-progress
# one will NOT be cancelled — the new one will be queued instead .
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Job: build
  # Installs dependencies, compiles TypeScript, and builds the Vite bundle.
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # Step: Actor guard
      # Aborts the workflow immediately if the triggering user is not "SRE-0".
      # This is a soft restriction — it does not prevent someone with write
      # access from creating a matching tag, but it will stop the job if they do.
      - name: Verify authorized actor
        if: github.actor != 'SRE-0'
        run: |
          echo "Unauthorized actor: ${{ github.actor }}. Only SRE-0 can trigger this workflow."
          exit 1

      # Step: Checkout repository code at the triggered tag.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step: Set up Node.js.
      # Using Node 20 LTS for stability. The cache key is tied to package-lock.json
      # so the cache is invalidated automatically when dependencies change.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step: Install all dependencies using the lockfile for reproducible builds.
      # "ci" is preferred over "install" in CI pipelines — it is faster and
      # will fail if package-lock.json is out of sync with package.json.
      - name: Install dependencies
        run: npm ci

      # Step: Run the Vite build (includes tsc -b as defined in package.json).
      # The output is written to the "dist/" directory by default.
      - name: Build project
        run: npm run build

      # Step: Configure GitHub Pages for this repository.
      # This sets up the necessary metadata for the deployment environment.
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # Step: Upload the "dist/" folder as a Pages artifact.
      # This artifact is later consumed by the "deploy" job.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  # -----------------------------------------------------------------------
  # Job: deploy
  # Takes the artifact from the build job and deploys it to GitHub Pages.
  # This job runs only after "build" completes successfully.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    # Associates this job with the "github-pages" deployment environment.
    # This enables the deployment URL to appear in the repository UI and
    # allows environment-level protection rules to be configured.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step: Actor guard (repeated for the deploy job as an extra safety layer).
      - name: Verify authorized actor
        if: github.actor != 'SRE-0'
        run: |
          echo "Unauthorized actor: ${{ github.actor }}. Only SRE-0 can trigger this workflow."
          exit 1

      # Step: Deploy the uploaded Pages artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4