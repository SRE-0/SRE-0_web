# .github/workflows/deploy.yml
#
# Builds a pure React + TypeScript (Vite) project and deploys it to GitHub Pages.
#
# Triggers ONLY when a tag matching "deploy-*" is pushed by the repo owner (SRE-0).
# Can also be triggered manually from the Actions tab (only by SRE-0).
#
# React Router requires a SPA redirect workaround for GitHub Pages.
# A 404.html is copied from public/ to handle deep-link refreshes.
#
# Required repository setting:
#   Settings > Pages > Source > must be set to "GitHub Actions"
#
# Optional secrets (add in Settings > Secrets > Actions if needed):
#   VITE_API_URL, VITE_SOME_KEY, etc.

name: Deploy to GitHub Pages

on:
  # Triggers when a tag matching "deploy-*" is pushed
  # Examples: deploy-v1.0, deploy-prod, deploy-hotfix
  push:
    tags:
      - "deploy-*"

  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Only the repository owner (SRE-0) can trigger a deploy.
    # This check applies to both tag pushes and manual triggers.
    if: github.actor == 'SRE-0'

    permissions:
      contents: read   # Read repository contents
      pages: write     # Write to GitHub Pages
      id-token: write  # Required by deploy-pages for OIDC authentication

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout the repository at the pushed tag
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Setup Node.js 20 with npm cache enabled
      # ------------------------------------------------------------------ #
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ------------------------------------------------------------------ #
      # 3. Cache ~/.npm to speed up installs on repeated runs
      #    Key is based on the OS + hash of package-lock.json
      # ------------------------------------------------------------------ #
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ------------------------------------------------------------------ #
      # 4. Install dependencies using the lockfile (no version drift)
      # ------------------------------------------------------------------ #
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------ #
      # 5. Build the Vite + React + TypeScript app for production
      #    Output goes to /dist as configured in vite.config.ts
      #    Add environment variable secrets here if your app needs them:
      #      VITE_API_URL: ${{ secrets.API_URL }}
      # ------------------------------------------------------------------ #
      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      # ------------------------------------------------------------------ #
      # 6. React Router SPA fix for GitHub Pages
      #
      #    GitHub Pages returns a real 404 for unknown paths (e.g. /about).
      #    Copying index.html to 404.html makes GitHub Pages serve your app
      #    shell on any route, letting React Router take over client-side.
      #
      #    See: public/404.html section below for the cleaner redirect approach.
      # ------------------------------------------------------------------ #
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # ------------------------------------------------------------------ #
      # 7. Upload the /dist folder as a Pages artifact
      # ------------------------------------------------------------------ #
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # ------------------------------------------------------------------ #
      # 8. Deploy the uploaded artifact to GitHub Pages
      # ------------------------------------------------------------------ #
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4